<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赴马教育 - 马来西亚留学智能匹配系统</title>
  <style>
    :root {
      --primary: #1a56db;
      --primary-light: #e8effc;
      --success: #059669;
      --warning: #d97706;
      --danger: #dc2626;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -4px rgba(0,0,0,.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      line-height: 1.6;
    }
    /* Header */
    .header {
      background: linear-gradient(135deg, #1e3a8a 0%, #1a56db 50%, #2563eb 100%);
      color: white;
      padding: 2rem 0;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
    }
    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      position: relative;
    }
    .header p {
      opacity: 0.9;
      margin-top: 0.5rem;
      font-size: 1.05rem;
      position: relative;
    }
    .header .badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.85rem;
      margin-top: 0.75rem;
      position: relative;
    }
    /* Layout */
    .container { max-width: 1100px; margin: 0 auto; padding: 0 1rem; }
    .tabs {
      display: flex;
      gap: 0;
      background: white;
      border-radius: 12px 12px 0 0;
      margin-top: -1rem;
      position: relative;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .tab {
      flex: 1;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      border: none;
      background: none;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--gray-500);
      transition: all 0.2s;
      border-bottom: 3px solid transparent;
    }
    .tab:hover { background: var(--gray-50); }
    .tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      background: var(--primary-light);
    }
    .panel {
      display: none;
      background: white;
      border-radius: 0 0 12px 12px;
      box-shadow: var(--shadow);
      padding: 2rem;
      margin-bottom: 2rem;
    }
    .panel.active { display: block; }
    /* Form */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }
    .form-group { display: flex; flex-direction: column; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.35rem;
      color: var(--gray-700);
    }
    .form-group label .req { color: var(--danger); }
    .form-group input, .form-group select, .form-group textarea {
      padding: 0.6rem 0.85rem;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      background: white;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26,86,219,0.1);
    }
    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.25rem;
    }
    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-weight: 400;
      font-size: 0.9rem;
      padding: 0.35rem 0.75rem;
      border: 1.5px solid var(--gray-200);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .checkbox-group label:has(input:checked) {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary);
    }
    .checkbox-group input { display: none; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    .btn-primary:hover { background: #1e40af; transform: translateY(-1px); box-shadow: var(--shadow-lg); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .form-actions {
      grid-column: 1 / -1;
      display: flex;
      justify-content: center;
      margin-top: 1rem;
    }
    /* Results */
    #results-area { margin-top: 2rem; }
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .results-header h2 { font-size: 1.3rem; }
    .gpa-note { font-size: 0.85rem; color: var(--gray-500); }
    .result-card {
      border: 1.5px solid var(--gray-200);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: all 0.2s;
      position: relative;
    }
    .result-card:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-lg);
    }
    .result-card .rank-badge {
      position: absolute;
      top: -1px;
      left: -1px;
      background: var(--primary);
      color: white;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.25rem 0.75rem;
      border-radius: 12px 0 8px 0;
    }
    .result-card .rank-badge.gold { background: #d97706; }
    .result-card .rank-badge.silver { background: #6b7280; }
    .result-card .rank-badge.bronze { background: #92400e; }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.75rem;
    }
    .card-top h3 { font-size: 1.15rem; padding-top: 0.25rem; }
    .card-top .uni-en { font-size: 0.8rem; color: var(--gray-500); font-weight: 400; }
    .card-top .tags { display: flex; gap: 0.35rem; flex-wrap: wrap; }
    .tag {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .tag-public { background: #dbeafe; color: #1e40af; }
    .tag-private { background: #fef3c7; color: #92400e; }
    .tag-branch { background: #d1fae5; color: #065f46; }
    .tag-qs { background: #ede9fe; color: #5b21b6; }
    .success-meter {
      width: 80px;
      text-align: center;
    }
    .success-meter .circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 700;
      margin: 0 auto 0.25rem;
    }
    .success-meter .label { font-size: 0.75rem; color: var(--gray-500); }
    .rate-high .circle { background: #d1fae5; color: #059669; border: 3px solid #059669; }
    .rate-mid .circle { background: #fef3c7; color: #d97706; border: 3px solid #d97706; }
    .rate-low .circle { background: #fee2e2; color: #dc2626; border: 3px solid #dc2626; }
    .card-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.75rem;
      margin: 0.75rem 0;
      padding: 0.75rem;
      background: var(--gray-50);
      border-radius: 8px;
    }
    .detail-item .dl { font-size: 0.75rem; color: var(--gray-500); }
    .detail-item .dv { font-size: 0.95rem; font-weight: 600; }
    .card-reasons { margin-top: 0.75rem; }
    .reason {
      display: inline-block;
      font-size: 0.8rem;
      padding: 0.2rem 0.5rem;
      margin: 0.15rem;
      border-radius: 4px;
    }
    .reason-good { background: #d1fae5; color: #065f46; }
    .reason-warn { background: #fef3c7; color: #92400e; }
    .card-expand {
      display: none;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--gray-200);
    }
    .card-expand.show { display: block; }
    .timeline {
      display: flex;
      gap: 0;
      margin-top: 0.75rem;
    }
    .timeline-step {
      flex: 1;
      text-align: center;
      position: relative;
      padding: 0.5rem 0.25rem;
    }
    .timeline-step::before {
      content: '';
      position: absolute;
      top: 1.4rem;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--primary-light);
    }
    .timeline-step:first-child::before { left: 50%; }
    .timeline-step:last-child::before { right: 50%; }
    .timeline-step .dot {
      width: 12px;
      height: 12px;
      background: var(--primary);
      border-radius: 50%;
      display: inline-block;
      position: relative;
      z-index: 1;
    }
    .timeline-step .step-label {
      display: block;
      font-size: 0.7rem;
      color: var(--gray-500);
      margin-top: 0.25rem;
    }
    .timeline-step .step-time {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--gray-700);
    }
    .expand-btn {
      background: none;
      border: none;
      color: var(--primary);
      font-size: 0.85rem;
      cursor: pointer;
      margin-top: 0.5rem;
      padding: 0.25rem 0;
    }
    .expand-btn:hover { text-decoration: underline; }
    /* Inquiry list */
    .inquiry-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .inquiry-table th, .inquiry-table td {
      padding: 0.6rem 0.75rem;
      text-align: left;
      border-bottom: 1px solid var(--gray-200);
    }
    .inquiry-table th {
      background: var(--gray-50);
      font-weight: 600;
      color: var(--gray-700);
      position: sticky;
      top: 0;
    }
    .inquiry-table tr:hover { background: var(--gray-50); }
    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: white;
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      padding: 1.25rem;
      text-align: center;
    }
    .stat-card .stat-num { font-size: 2rem; font-weight: 700; color: var(--primary); }
    .stat-card .stat-label { font-size: 0.85rem; color: var(--gray-500); }
    /* Loading */
    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--gray-500);
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--gray-200);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Footer */
    .footer {
      text-align: center;
      padding: 1.5rem;
      color: var(--gray-500);
      font-size: 0.85rem;
    }
    /* Mobile */
    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
      .header h1 { font-size: 1.5rem; }
      .card-top { flex-direction: column; gap: 0.5rem; }
      .card-details { grid-template-columns: 1fr 1fr; }
      .tabs { font-size: 0.85rem; }
      .tab { padding: 0.75rem 0.5rem; }
      .timeline { flex-direction: column; gap: 0.25rem; }
      .timeline-step::before { display: none; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="container">
    <h1>赴马教育</h1>
    <p>马来西亚留学智能匹配系统</p>
    <span class="badge">覆盖 15 所优质大学 &middot; 智能匹配 &middot; 成功率评估</span>
  </div>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('match')">智能匹配</button>
    <button class="tab" onclick="switchTab('universities')">大学总览</button>
    <button class="tab" onclick="switchTab('inquiries')">咨询记录</button>
  </div>

  <!-- 智能匹配面板 -->
  <div class="panel active" id="panel-match">
    <form id="matchForm" onsubmit="handleMatch(event)">
      <div class="form-grid">
        <div class="form-group">
          <label>姓名 <span class="req">*</span></label>
          <input type="text" name="name" required placeholder="请输入您的姓名">
        </div>
        <div class="form-group">
          <label>手机号</label>
          <input type="tel" name="phone" placeholder="方便后续联系">
        </div>
        <div class="form-group">
          <label>微信号</label>
          <input type="text" name="wechat" placeholder="方便后续联系">
        </div>
        <div class="form-group">
          <label>当前学历 <span class="req">*</span></label>
          <select name="education" required>
            <option value="">请选择</option>
            <option value="高中">高中 / 中专</option>
            <option value="大专">大专</option>
            <option value="本科">本科</option>
            <option value="硕士">硕士</option>
          </select>
        </div>
        <div class="form-group">
          <label>GPA / 均分 <span class="req">*</span></label>
          <input type="number" name="gpa" required step="0.01" min="0" max="100"
            placeholder="4.0制或百分制均可，如 3.5 或 85">
        </div>
        <div class="form-group">
          <label>雅思成绩（没有可填0）</label>
          <input type="number" name="ielts" step="0.5" min="0" max="9" value="0"
            placeholder="如 6.0">
        </div>
        <div class="form-group">
          <label>申请层次 <span class="req">*</span></label>
          <select name="targetLevel" required>
            <option value="">请选择</option>
            <option value="bachelor">本科</option>
            <option value="master">硕士</option>
            <option value="phd">博士</option>
          </select>
        </div>
        <div class="form-group">
          <label>意向专业方向</label>
          <select name="targetMajor">
            <option value="不限">不限</option>
            <option value="商科">商科 / 管理 / 金融</option>
            <option value="计算机">计算机 / IT / 软件</option>
            <option value="工程">工程 / 理工</option>
            <option value="教育">教育</option>
            <option value="医学">医学 / 护理 / 药学</option>
            <option value="传媒">传媒 / 新闻</option>
            <option value="艺术设计">艺术 / 设计 / 音乐</option>
            <option value="社科">社科 / 心理学</option>
            <option value="理科">理科 / 农业 / 环境</option>
            <option value="酒店旅游">酒店 / 旅游管理</option>
          </select>
        </div>
        <div class="form-group full">
          <label>总预算（人民币，含学费+生活费+服务费）</label>
          <input type="number" name="budget" min="0" step="10000" placeholder="如 200000（不填则不限）">
        </div>
        <div class="form-group full">
          <label>留学偏好（可多选）</label>
          <div class="checkbox-group">
            <label><input type="checkbox" name="pref" value="排名优先">排名优先</label>
            <label><input type="checkbox" name="pref" value="性价比">性价比高</label>
            <label><input type="checkbox" name="pref" value="就业导向">就业导向</label>
            <label><input type="checkbox" name="pref" value="学位认可">学位国际认可</label>
            <label><input type="checkbox" name="pref" value="城市生活">首都吉隆坡</label>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submitBtn">
            开始智能匹配
          </button>
        </div>
      </div>
    </form>

    <div id="results-area"></div>
  </div>

  <!-- 大学总览面板 -->
  <div class="panel" id="panel-universities">
    <div id="uni-list"><div class="loading"><div class="spinner"></div>加载中...</div></div>
  </div>

  <!-- 咨询记录面板 -->
  <div class="panel" id="panel-inquiries">
    <div id="inquiry-list"><div class="loading"><div class="spinner"></div>加载中...</div></div>
  </div>
</div>

<div class="footer">
  &copy; 2026 赴马教育 &middot; 马来西亚留学专业服务
</div>

<script>
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['match','universities','inquiries'][i] === name);
  });
  document.querySelectorAll('.panel').forEach((p, i) => {
    p.classList.toggle('active', ['match','universities','inquiries'][i] === name);
  });
  if (name === 'universities') loadUniversities();
  if (name === 'inquiries') loadInquiries();
}

async function handleMatch(e) {
  e.preventDefault();
  const form = e.target;
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '匹配中...';

  const prefs = [...form.querySelectorAll('input[name="pref"]:checked')].map(c => c.value);

  const data = {
    name: form.name.value,
    phone: form.phone.value,
    wechat: form.wechat.value,
    education: form.education.value,
    gpa: parseFloat(form.gpa.value),
    ielts: parseFloat(form.ielts.value) || 0,
    budget: parseInt(form.budget.value) || 0,
    targetLevel: form.targetLevel.value,
    targetMajor: form.targetMajor.value,
    preferences: prefs,
  };

  try {
    const res = await fetch('/api/match', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const json = await res.json();
    renderResults(json, data);
  } catch (err) {
    document.getElementById('results-area').innerHTML =
      `<div class="loading" style="color:var(--danger)">匹配失败，请重试: ${err.message}</div>`;
  }
  btn.disabled = false;
  btn.textContent = '开始智能匹配';
}

function renderResults(json, student) {
  const { results, gpa4 } = json;
  if (!results.length) {
    document.getElementById('results-area').innerHTML =
      '<div class="loading">暂无匹配结果，请调整条件后重试</div>';
    return;
  }

  const gpaNote = student.gpa > 4 ? `（百分制 ${student.gpa} 分 → 4.0制 ${gpa4}）` : '';

  let html = `
    <div class="results-header">
      <h2>为您找到 ${results.length} 个推荐方案</h2>
      <span class="gpa-note">${gpaNote}</span>
    </div>
  `;

  results.forEach((r, i) => {
    const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    const rateClass = r.success_rate >= 70 ? 'rate-high' : r.success_rate >= 40 ? 'rate-mid' : 'rate-low';
    const typeClass = r.uni_type === '公立' ? 'tag-public' : r.uni_type === '私立' ? 'tag-private' : 'tag-branch';

    // 计算时间线
    const now = new Date();
    const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    const nextIntake = findNextIntake(r.intake, now, r.apply_months);

    html += `
      <div class="result-card">
        <span class="rank-badge ${rankClass}">TOP ${i+1}</span>
        <div class="card-top">
          <div>
            <h3>${r.uni_name} · ${r.program_name}</h3>
            <span class="uni-en">${r.uni_name_en || ''}</span>
          </div>
          <div class="success-meter ${rateClass}">
            <div class="circle">${r.success_rate}%</div>
            <span class="label">成功率</span>
          </div>
        </div>
        <div class="card-top" style="margin-bottom:0">
          <div class="tags">
            <span class="tag ${typeClass}">${r.uni_type}</span>
            ${r.qs_ranking !== '未上榜' ? `<span class="tag tag-qs">QS #${r.qs_ranking}</span>` : ''}
            <span class="tag" style="background:#f3f4f6;color:#374151">${r.city}</span>
            <span class="tag" style="background:#f3f4f6;color:#374151">${r.level} · ${r.duration}年</span>
          </div>
        </div>
        <div class="card-details">
          <div class="detail-item">
            <div class="dl">总学费</div>
            <div class="dv">¥${r.tuition_total.toLocaleString()}</div>
          </div>
          <div class="detail-item">
            <div class="dl">生活费(总)</div>
            <div class="dv">¥${r.living_cost_total.toLocaleString()}</div>
          </div>
          <div class="detail-item">
            <div class="dl">服务费</div>
            <div class="dv">¥${r.service_fee.toLocaleString()}</div>
          </div>
          <div class="detail-item">
            <div class="dl">总花费</div>
            <div class="dv" style="color:var(--primary)">¥${r.total_cost.toLocaleString()}</div>
          </div>
          <div class="detail-item">
            <div class="dl">GPA要求</div>
            <div class="dv">${r.gpa_req}</div>
          </div>
          <div class="detail-item">
            <div class="dl">雅思要求</div>
            <div class="dv">${r.ielts_req}</div>
          </div>
        </div>
        <div class="card-reasons">
          ${r.reasons.map(x => `<span class="reason reason-good">+ ${x}</span>`).join('')}
          ${r.warnings.map(x => `<span class="reason reason-warn">! ${x}</span>`).join('')}
          ${r.special_req ? `<span class="reason reason-warn">要求: ${r.special_req}</span>` : ''}
        </div>
        <button class="expand-btn" onclick="toggleExpand(this)">查看详细时间规划 ▼</button>
        <div class="card-expand">
          <p style="font-size:0.9rem;color:var(--gray-700);margin-bottom:0.5rem">${r.uni_desc}</p>
          <strong style="font-size:0.85rem">入学时间：</strong>
          <span style="font-size:0.85rem">${r.intake.join('、')}</span>
          <br>
          <strong style="font-size:0.85rem">申请周期：</strong>
          <span style="font-size:0.85rem">约 ${r.apply_months} 个月</span>
          <div class="timeline">
            <div class="timeline-step">
              <span class="dot"></span>
              <span class="step-time">即日起</span>
              <span class="step-label">准备材料</span>
            </div>
            <div class="timeline-step">
              <span class="dot"></span>
              <span class="step-time">1-2周</span>
              <span class="step-label">递交申请</span>
            </div>
            <div class="timeline-step">
              <span class="dot"></span>
              <span class="step-time">${r.apply_months - 1}个月</span>
              <span class="step-label">获得offer</span>
            </div>
            <div class="timeline-step">
              <span class="dot"></span>
              <span class="step-time">${r.apply_months}个月</span>
              <span class="step-label">办理签证</span>
            </div>
            <div class="timeline-step">
              <span class="dot"></span>
              <span class="step-time">${nextIntake}</span>
              <span class="step-label">正式入学</span>
            </div>
          </div>
          <div style="margin-top:1rem;padding:0.75rem;background:var(--primary-light);border-radius:8px;font-size:0.85rem">
            <strong>服务包含：</strong>院校申请、材料翻译公证、offer跟进、签证办理、接机安排、入学注册协助
          </div>
        </div>
      </div>
    `;
  });

  document.getElementById('results-area').innerHTML = html;
  document.getElementById('results-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function findNextIntake(intakeMonths, now, applyMonths) {
  const monthNums = intakeMonths.map(m => parseInt(m));
  const currentMonth = now.getMonth() + 1;
  const readyMonth = currentMonth + applyMonths;

  for (const m of monthNums) {
    let target = m;
    if (target < readyMonth % 12 || target === 0) target += 12;
    if (target >= readyMonth) {
      const year = now.getFullYear() + (currentMonth + applyMonths > 12 && m <= 12 ? 1 : 0);
      const actualYear = m < currentMonth ? now.getFullYear() + 1 : now.getFullYear();
      return `${Math.max(actualYear, year)}年${m}月`;
    }
  }
  return `${now.getFullYear() + 1}年${monthNums[0]}月`;
}

function toggleExpand(btn) {
  const expand = btn.nextElementSibling;
  expand.classList.toggle('show');
  btn.textContent = expand.classList.contains('show') ? '收起详情 ▲' : '查看详细时间规划 ▼';
}

async function loadUniversities() {
  const container = document.getElementById('uni-list');
  try {
    const res = await fetch('/api/universities');
    const unis = await res.json();
    let html = `<table class="inquiry-table">
      <tr><th>排名</th><th>大学名称</th><th>类型</th><th>城市</th><th>QS排名</th><th>年学费范围</th><th>优势专业</th></tr>`;
    unis.forEach((u, i) => {
      const strengths = JSON.parse(u.strengths).slice(0, 3).join('、');
      html += `<tr>
        <td>${i + 1}</td>
        <td><strong>${u.name}</strong><br><small style="color:var(--gray-500)">${u.name_en}</small></td>
        <td>${u.type === 'public' ? '公立' : u.type === 'private' ? '私立' : '海外分校'}</td>
        <td>${u.city}</td>
        <td>${u.qs_ranking || '-'}</td>
        <td>¥${u.tuition_min.toLocaleString()} - ¥${u.tuition_max.toLocaleString()}</td>
        <td>${strengths}</td>
      </tr>`;
    });
    html += '</table>';
    container.innerHTML = html;
  } catch (err) {
    container.innerHTML = `<div class="loading" style="color:var(--danger)">加载失败</div>`;
  }
}

async function loadInquiries() {
  const container = document.getElementById('inquiry-list');
  try {
    const [inqRes, statsRes] = await Promise.all([
      fetch('/api/inquiries'),
      fetch('/api/stats')
    ]);
    const inquiries = await inqRes.json();
    const stats = await statsRes.json();

    let html = `
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-num">${stats.total}</div>
          <div class="stat-label">总咨询量</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">${stats.today}</div>
          <div class="stat-label">今日咨询</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">${stats.topMajors.length ? stats.topMajors[0].target_major : '-'}</div>
          <div class="stat-label">最热门专业</div>
        </div>
      </div>
    `;

    if (inquiries.length === 0) {
      html += '<div class="loading">暂无咨询记录</div>';
    } else {
      html += `<table class="inquiry-table">
        <tr><th>时间</th><th>姓名</th><th>学历</th><th>GPA</th><th>雅思</th><th>目标</th><th>意向专业</th></tr>`;
      inquiries.forEach(q => {
        const level = q.target_level === 'bachelor' ? '本科' : q.target_level === 'master' ? '硕士' : '博士';
        const time = new Date(q.created_at + 'Z');
        const timeStr = time.toLocaleString('zh-CN', { timeZone: 'Asia/Kuala_Lumpur', month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
        html += `<tr>
          <td>${timeStr}</td>
          <td>${q.name}</td>
          <td>${q.education}</td>
          <td>${q.gpa}</td>
          <td>${q.ielts || '-'}</td>
          <td>${level}</td>
          <td>${q.target_major || '不限'}</td>
        </tr>`;
      });
      html += '</table>';
    }
    container.innerHTML = html;
  } catch (err) {
    container.innerHTML = `<div class="loading" style="color:var(--danger)">加载失败</div>`;
  }
}
