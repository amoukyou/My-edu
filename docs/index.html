<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赴马教育 - 马来西亚留学智能规划系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0f4c8a;
      --primary-dark: #0a3562;
      --primary-light: #e6f0fa;
      --accent: #c8a84e;
      --accent-light: #faf5e6;
      --success: #16713a;
      --success-bg: #e6f5ec;
      --warning: #b8860b;
      --warning-bg: #fef8e7;
      --danger: #b91c1c;
      --danger-bg: #fde8e8;
      --gray-50: #f8f9fb;
      --gray-100: #f1f3f5;
      --gray-200: #e2e5e9;
      --gray-300: #cdd1d7;
      --gray-400: #9da3ae;
      --gray-500: #6c7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
      --radius: 10px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,.08), 0 2px 4px -2px rgba(0,0,0,.05);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.08), 0 4px 6px -4px rgba(0,0,0,.03);
      --shadow-xl: 0 20px 25px -5px rgba(0,0,0,.08), 0 8px 10px -6px rgba(0,0,0,.03);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== HEADER ===== */
    .header {
      background: linear-gradient(160deg, #071e3d 0%, #0f4c8a 40%, #1565b8 70%, #1976d2 100%);
      color: white;
      padding: 0;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .header-inner {
      max-width: 1140px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 3.5rem;
      position: relative;
      z-index: 1;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.75rem;
    }
    .brand-logo {
      width: 52px; height: 52px;
      background: var(--accent);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 800; color: var(--primary-dark);
      box-shadow: 0 4px 12px rgba(200,168,78,0.3);
    }
    .brand-text h1 {
      font-size: 1.75rem; font-weight: 800; letter-spacing: 1px; line-height: 1.2;
    }
    .brand-text p {
      font-size: 0.85rem; opacity: 0.7; margin-top: 2px; letter-spacing: 0.5px;
    }
    .hero-title {
      font-size: 2.2rem; font-weight: 800; line-height: 1.3;
      max-width: 600px;
    }
    .hero-title span { color: var(--accent); }
    .hero-sub {
      font-size: 1.05rem; opacity: 0.85; margin-top: 0.75rem;
      max-width: 520px; line-height: 1.7;
    }
    .hero-stats {
      display: flex; gap: 2rem; margin-top: 1.5rem; flex-wrap: wrap;
    }
    .hero-stat {
      display: flex; flex-direction: column;
    }
    .hero-stat .num {
      font-size: 1.6rem; font-weight: 800; color: var(--accent);
    }
    .hero-stat .lbl {
      font-size: 0.78rem; opacity: 0.7;
    }

    /* ===== LAYOUT ===== */
    .container { max-width: 1140px; margin: 0 auto; padding: 0 1.5rem; }
    .main-wrap {
      margin-top: -2rem;
      position: relative;
      z-index: 2;
    }
    .tabs {
      display: flex; gap: 4px;
      margin-bottom: 0;
    }
    .tab {
      padding: 0.75rem 1.5rem;
      border: none;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(8px);
      border-radius: var(--radius) var(--radius) 0 0;
      font-size: 0.9rem; font-weight: 600;
      color: var(--gray-500);
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab:hover { background: rgba(255,255,255,0.9); color: var(--gray-700); }
    .tab.active {
      background: white;
      color: var(--primary);
      box-shadow: var(--shadow-sm);
    }
    .panel {
      display: none;
      background: white;
      border-radius: 0 var(--radius) var(--radius) var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 2.5rem;
      margin-bottom: 3rem;
    }
    .panel.active { display: block; }

    /* ===== FORM ===== */
    .section-title {
      font-size: 1.1rem; font-weight: 700; color: var(--gray-800);
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid var(--gray-100);
      display: flex; align-items: center; gap: 0.5rem;
    }
    .section-title .icon {
      width: 28px; height: 28px;
      background: var(--primary-light);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
    }
    .form-section { margin-bottom: 2rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label {
      font-weight: 600; font-size: 0.82rem; margin-bottom: 0.4rem;
      color: var(--gray-600); text-transform: uppercase; letter-spacing: 0.3px;
    }
    .form-group label .req { color: var(--danger); font-weight: 700; }
    .form-group .hint {
      font-size: 0.75rem; color: var(--gray-400); font-weight: 400;
      text-transform: none; letter-spacing: 0;
    }
    .form-group input, .form-group select {
      padding: 0.7rem 0.9rem;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      font-size: 0.92rem;
      font-family: inherit;
      transition: all 0.2s;
      background: white;
      color: var(--gray-800);
    }
    .form-group input::placeholder { color: var(--gray-400); }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15,76,138,0.08);
    }
    .pref-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.5rem; margin-top: 0.25rem;
    }
    .pref-item {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.55rem 0.75rem;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.88rem;
      user-select: none;
      background: white;
    }
    .pref-item:hover { border-color: var(--gray-300); background: var(--gray-50); }
    .pref-item:has(input:checked) {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 600;
    }
    .pref-item input { display: none; }
    .pref-item .pref-icon { font-size: 1rem; }
    .btn-submit {
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
      width: 100%; max-width: 380px;
      margin: 2rem auto 0;
      padding: 0.9rem 2rem;
      border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s;
      background: linear-gradient(135deg, var(--primary) 0%, #1565b8 100%);
      color: white;
      box-shadow: 0 4px 14px rgba(15,76,138,0.25);
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(15,76,138,0.35);
    }
    .btn-submit:active { transform: translateY(0); }

    /* ===== RESULTS ===== */
    #results-area { margin-top: 2.5rem; }
    .results-banner {
      background: linear-gradient(135deg, var(--primary-light) 0%, #dbeafe 100%);
      border-radius: var(--radius);
      padding: 1.5rem 2rem;
      margin-bottom: 1.5rem;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 1rem;
    }
    .results-banner h2 { font-size: 1.25rem; color: var(--primary-dark); }
    .results-banner .meta { font-size: 0.85rem; color: var(--primary); }

    .result-card {
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      margin-bottom: 1.25rem;
      overflow: hidden;
      transition: all 0.25s;
    }
    .result-card:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-xl);
      transform: translateY(-2px);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: stretch;
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-100);
    }
    .card-header-left {
      padding: 1.25rem 1.5rem;
      flex: 1;
    }
    .card-rank {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      margin-bottom: 0.5rem;
    }
    .rank-1 { background: linear-gradient(135deg,#fbbf24,#f59e0b); color: #78350f; }
    .rank-2 { background: linear-gradient(135deg,#d1d5db,#9ca3af); color: #1f2937; }
    .rank-3 { background: linear-gradient(135deg,#d97706,#b45309); color: white; }
    .rank-n { background: var(--gray-200); color: var(--gray-600); }
    .card-uni-name { font-size: 1.2rem; font-weight: 700; color: var(--gray-900); line-height: 1.3; }
    .card-uni-en { font-size: 0.78rem; color: var(--gray-400); margin-top: 2px; }
    .card-program { font-size: 0.95rem; color: var(--primary); font-weight: 600; margin-top: 0.4rem; }
    .card-tags { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .tag {
      display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px;
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.3px;
    }
    .tag-public { background: #dbeafe; color: #1e40af; }
    .tag-private { background: #fef3c7; color: #92400e; }
    .tag-branch { background: #d1fae5; color: #065f46; }
    .tag-qs { background: #ede9fe; color: #5b21b6; }
    .tag-city { background: var(--gray-100); color: var(--gray-600); }
    .tag-dur { background: #fce7f3; color: #9d174d; }

    .card-header-right {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1rem 1.5rem;
      min-width: 120px;
      border-left: 1px solid var(--gray-100);
    }
    .rate-ring {
      width: 72px; height: 72px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
    }
    .rate-ring .pct { font-size: 1.3rem; font-weight: 800; line-height: 1; }
    .rate-ring .pct-label { font-size: 0.6rem; font-weight: 600; margin-top: 2px; }
    .rate-high { background: var(--success-bg); color: var(--success); border: 3px solid var(--success); }
    .rate-mid { background: var(--warning-bg); color: var(--warning); border: 3px solid var(--warning); }
    .rate-low { background: var(--danger-bg); color: var(--danger); border: 3px solid var(--danger); }
    .rate-label { font-size: 0.72rem; color: var(--gray-400); margin-top: 0.35rem; font-weight: 500; }

    .card-body { padding: 1.25rem 1.5rem; }

    /* 费用表格 */
    .fee-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
      margin-bottom: 1rem;
    }
    .fee-table th {
      text-align: left;
      font-size: 0.72rem; font-weight: 600;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      padding: 0.4rem 0.75rem;
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-100);
    }
    .fee-table td {
      padding: 0.55rem 0.75rem;
      border-bottom: 1px solid var(--gray-100);
      color: var(--gray-700);
    }
    .fee-table .fee-val { font-weight: 700; font-variant-numeric: tabular-nums; }
    .fee-table .fee-rmb { font-size: 0.78rem; color: var(--gray-400); }
    .fee-table tr.total-row td {
      font-weight: 700;
      color: var(--primary);
      background: var(--primary-light);
      border-bottom: none;
    }
    .fee-table tr.total-row .fee-val { font-size: 1rem; }

    /* 录取要求 */
    .req-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 0.75rem; margin-bottom: 1rem;
    }
    .req-item {
      padding: 0.75rem;
      background: var(--gray-50);
      border-radius: 8px;
      border: 1px solid var(--gray-100);
    }
    .req-item .req-label { font-size: 0.72rem; color: var(--gray-400); font-weight: 600; text-transform: uppercase; }
    .req-item .req-value { font-size: 1rem; font-weight: 700; color: var(--gray-800); margin-top: 2px; }
    .req-item .req-note { font-size: 0.75rem; color: var(--gray-500); margin-top: 2px; }

    /* 匹配分析 */
    .analysis { margin-bottom: 1rem; }
    .analysis-title { font-size: 0.8rem; font-weight: 700; color: var(--gray-600); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.3px; }
    .pill {
      display: inline-flex; align-items: center; gap: 0.25rem;
      font-size: 0.8rem; padding: 0.25rem 0.6rem; margin: 0.15rem;
      border-radius: 5px; font-weight: 500;
    }
    .pill-good { background: var(--success-bg); color: var(--success); }
    .pill-warn { background: var(--warning-bg); color: var(--warning); }

    /* 展开详情 */
    .card-expand-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
      width: 100%;
      padding: 0.6rem;
      border: none; border-top: 1px solid var(--gray-100);
      background: var(--gray-50);
      color: var(--primary);
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .card-expand-btn:hover { background: var(--primary-light); }
    .card-detail { display: none; padding: 1.5rem; background: var(--gray-50); border-top: 1px solid var(--gray-100); }
    .card-detail.show { display: block; }

    /* 时间规划 */
    .plan-section { margin-bottom: 1.5rem; }
    .plan-section h4 {
      font-size: 0.85rem; font-weight: 700; color: var(--gray-700);
      margin-bottom: 0.75rem;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .timeline-pro {
      position: relative;
      padding-left: 2rem;
    }
    .timeline-pro::before {
      content: '';
      position: absolute;
      left: 7px; top: 4px; bottom: 4px;
      width: 2px;
      background: linear-gradient(to bottom, var(--primary), var(--accent));
      border-radius: 1px;
    }
    .tl-step {
      position: relative;
      padding: 0.5rem 0 0.75rem 1rem;
    }
    .tl-step::before {
      content: '';
      position: absolute;
      left: -1.95rem; top: 0.7rem;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: white;
      border: 2.5px solid var(--primary);
    }
    .tl-step:last-child::before { border-color: var(--accent); background: var(--accent); }
    .tl-step .tl-time {
      font-size: 0.75rem; font-weight: 700; color: var(--primary);
      text-transform: uppercase;
    }
    .tl-step .tl-title { font-size: 0.9rem; font-weight: 600; color: var(--gray-800); }
    .tl-step .tl-desc { font-size: 0.8rem; color: var(--gray-500); margin-top: 2px; }

    /* 入学日历 */
    .intake-calendar {
      display: flex; gap: 0; border: 1px solid var(--gray-200); border-radius: 8px; overflow: hidden;
      margin-top: 0.5rem;
    }
    .intake-month {
      flex: 1; text-align: center; padding: 0.5rem 0.25rem;
      font-size: 0.7rem; font-weight: 600; color: var(--gray-400);
      border-right: 1px solid var(--gray-100);
      background: white;
      transition: all 0.2s;
    }
    .intake-month:last-child { border-right: none; }
    .intake-month.active {
      background: var(--primary);
      color: white;
    }
    .intake-month.recommended {
      background: var(--accent);
      color: var(--primary-dark);
    }
    .intake-month .mo-label { display: block; font-size: 0.65rem; font-weight: 400; opacity: 0.7; }

    /* 服务清单 */
    .service-list {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.35rem;
      margin-top: 0.5rem;
    }
    .service-item {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.82rem; color: var(--gray-600);
      padding: 0.3rem 0;
    }
    .service-check {
      width: 16px; height: 16px;
      background: var(--success-bg);
      color: var(--success);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem; font-weight: 700; flex-shrink: 0;
    }

    /* ===== 大学总览 ===== */
    .uni-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.25rem; }
    .uni-card {
      border: 1.5px solid var(--gray-200); border-radius: var(--radius);
      overflow: hidden; transition: all 0.25s; background: white;
    }
    .uni-card:hover { border-color: var(--primary); box-shadow: var(--shadow-lg); transform: translateY(-2px); }
    .uni-card-head {
      padding: 1.25rem 1.25rem 0.75rem;
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .uni-card h3 { font-size: 1.05rem; font-weight: 700; line-height: 1.3; }
    .uni-card .en { font-size: 0.75rem; color: var(--gray-400); margin-top: 2px; }
    .uni-card-body { padding: 0 1.25rem 1.25rem; }
    .uni-info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.35rem 0; font-size: 0.85rem;
      border-bottom: 1px dashed var(--gray-100);
    }
    .uni-info-row:last-child { border-bottom: none; }
    .uni-info-row .lbl { color: var(--gray-400); font-size: 0.8rem; }
    .uni-info-row .val { font-weight: 600; color: var(--gray-700); }
    .uni-strengths { display: flex; flex-wrap: wrap; gap: 0.25rem; margin-top: 0.6rem; }
    .uni-strengths span {
      font-size: 0.72rem; padding: 0.15rem 0.45rem;
      background: var(--primary-light); color: var(--primary);
      border-radius: 3px; font-weight: 500;
    }
    .uni-desc {
      font-size: 0.8rem; color: var(--gray-500); margin-top: 0.6rem; line-height: 1.55;
      padding-top: 0.6rem; border-top: 1px solid var(--gray-100);
    }

    /* ===== FOOTER ===== */
    .footer {
      background: var(--gray-900);
      color: var(--gray-400);
      padding: 2rem 0;
    }
    .footer-inner {
      max-width: 1140px; margin: 0 auto; padding: 0 1.5rem;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 1rem;
      font-size: 0.82rem;
    }
    .footer-brand { color: white; font-weight: 700; font-size: 1rem; }
    .footer-links { display: flex; gap: 1.5rem; }
    .footer-links a { color: var(--gray-400); text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: white; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .header-inner { padding: 1.5rem 1rem 2.5rem; }
      .hero-title { font-size: 1.5rem; }
      .hero-stats { gap: 1.5rem; }
      .form-grid { grid-template-columns: 1fr; }
      .form-grid-2 { grid-template-columns: 1fr; }
      .panel { padding: 1.5rem 1rem; }
      .card-header { flex-direction: column; }
      .card-header-right { flex-direction: row; border-left: none; border-top: 1px solid var(--gray-100); padding: 0.75rem 1.5rem; gap: 0.75rem; }
      .fee-table { font-size: 0.82rem; }
      .fee-table th, .fee-table td { padding: 0.4rem 0.5rem; }
      .req-grid { grid-template-columns: 1fr 1fr; }
      .service-list { grid-template-columns: 1fr; }
      .pref-grid { grid-template-columns: 1fr 1fr; }
      .uni-grid { grid-template-columns: 1fr; }
      .intake-month { font-size: 0.6rem; padding: 0.35rem 0.15rem; }
      .footer-inner { flex-direction: column; text-align: center; }
      .tab { padding: 0.6rem 1rem; font-size: 0.82rem; }
    }
  </style>
</head>

// ====== GPA转换 ======
function toGpa4(gpa) {
  if (gpa <= 4.0) return gpa;
  if (gpa >= 90) return 3.7;
  if (gpa >= 85) return 3.5;
  if (gpa >= 80) return 3.3;
  if (gpa >= 75) return 3.0;
  if (gpa >= 70) return 2.7;
  if (gpa >= 65) return 2.3;
  if (gpa >= 60) return 2.0;
  return 1.5;
}

// ====== 匹配算法 ======
function matchUniversities(student) {
  const { gpa, ielts, budget, targetLevel, targetMajor, preferences } = student;
  const gpa4 = toGpa4(gpa);
  const results = [];

  for (const uni of universities) {
    for (const prog of uni.programs) {
      if (prog.level !== targetLevel) continue;
      let score = 0, reasons = [], warnings = [];

      // 专业匹配
      if (targetMajor && targetMajor !== '不限') {
        if (prog.cat === targetMajor) { score += 30; reasons.push('专业方向完全匹配'); }
        else continue;
      } else { score += 15; }

      // GPA
      const gpaReq = prog.gpa || uni.min_gpa;
      if (gpa4 >= gpaReq + 0.5) { score += 25; reasons.push('GPA远超录取线'); }
      else if (gpa4 >= gpaReq + 0.2) { score += 20; reasons.push('GPA高于录取线'); }
      else if (gpa4 >= gpaReq) { score += 15; reasons.push('GPA达到录取要求'); }
      else if (gpa4 >= gpaReq - 0.3) { score += 5; warnings.push('GPA略低，建议补充科研/实习经历'); }
      else { score -= 10; warnings.push('GPA低于最低要求，录取难度较大'); }

      // 语言
      const ieltsReq = prog.ielts || uni.ielts_min;
      if (ielts >= ieltsReq + 0.5) { score += 20; reasons.push('语言成绩优秀'); }
      else if (ielts >= ieltsReq) { score += 15; reasons.push('语言成绩达标'); }
      else if (ielts > 0 && ielts >= ieltsReq - 0.5) { score += 5; warnings.push('语言略低，可配语言班衔接'); }
      else if (ielts === 0) { score += 5; warnings.push('暂无语言成绩，可参加校内英语测试或先读语言班'); }
      else { warnings.push('语言成绩不足，建议先读语言预科'); }

      // 预算
      const totalCost = prog.fee + uni.living_cost * prog.dur + uni.service_fee;
      const yearlyCost = Math.round(prog.fee / prog.dur + uni.living_cost);
      if (budget > 0) {
        if (budget >= totalCost * 1.2) { score += 15; reasons.push('预算充裕'); }
        else if (budget >= totalCost) { score += 12; reasons.push('预算匹配'); }
        else if (budget >= totalCost * 0.8) { score += 5; warnings.push('预算略紧张，可申请奖学金'); }
        else { score -= 5; warnings.push('超出预算，建议考虑更经济方案'); }
      } else { score += 8; }

      // 偏好
      if (preferences) {
        if (preferences.includes('排名优先') && uni.qs > 0 && uni.qs <= 200) { score += 10; reasons.push('QS世界排名第' + uni.qs + '位'); }
        if (preferences.includes('性价比') && yearlyCost < 50000) { score += 10; reasons.push('年均费用低于5万，高性价比'); }
        if (preferences.includes('就业导向') && uni.type === 'private') { score += 5; reasons.push('私立大学企业合作资源丰富'); }
        if (preferences.includes('学位认可') && uni.type === 'foreign_branch') { score += 8; reasons.push('海外名校分校，学位全球认可'); }
        if (preferences.includes('城市生活') && uni.city === '吉隆坡') { score += 5; reasons.push('位于首都吉隆坡'); }
        if (preferences.includes('快速入学') && uni.intake.length >= 3) { score += 7; reasons.push('一年' + uni.intake.length + '次入学，灵活安排'); }
      }

      // 成功率
      let rate;
      if (score >= 70) rate = Math.min(95, 80 + Math.floor(Math.random()*10));
      else if (score >= 55) rate = 65 + Math.floor(Math.random()*15);
      else if (score >= 40) rate = 45 + Math.floor(Math.random()*15);
      else if (score >= 25) rate = 25 + Math.floor(Math.random()*15);
      else rate = Math.max(5, 10 + Math.floor(Math.random()*10));
      if (gpa4 < gpaReq - 0.3) rate = Math.max(5, Math.floor(rate * 0.3));

      results.push({
        uni, prog,
        uni_type: uni.type === 'public' ? '公立' : uni.type === 'private' ? '私立' : '海外名校分校',
        totalCost, yearlyCost,
        ieltsReq, gpaReq,
        score, rate, reasons, warnings,
      });
    }
  }
  results.sort((a,b) => b.score - a.score);
  return { results: results.slice(0, 10), gpa4 };
}

// ====== 入学时间计算 ======
const MONTH_NAMES = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
function calcIntakePlan(intakeMonths, applyMonths) {
  const now = new Date();
  const curMonth = now.getMonth() + 1;
  const curYear = now.getFullYear();
  const readyMonth = curMonth + applyMonths;

  // 找最近可入学的月份
  let bestMonth = null, bestYear = null;
  for (let offset = 0; offset <= 1; offset++) {
    for (const m of intakeMonths) {
      const targetMonth = m;
      const targetYear = curYear + offset;
      const monthsUntil = (targetYear - curYear) * 12 + targetMonth - curMonth;
      if (monthsUntil >= applyMonths) {
        if (!bestMonth || monthsUntil < ((bestYear - curYear)*12 + bestMonth - curMonth)) {
          bestMonth = targetMonth;
          bestYear = targetYear;
        }
      }
    }
    if (bestMonth) break;
  }
  if (!bestMonth) { bestMonth = intakeMonths[0]; bestYear = curYear + 1; }

  return { month: bestMonth, year: bestYear };
}

}

            以上费用为预估参考价，实际学费以院校最新收费标准为准。汇率按 1 MYR ≈ ${MYR_TO_RMB} RMB 换算。
            如需了解奖学金申请、实习安排等详细信息，请联系您的专属顾问。
          </div>
        </div>
      </div>
    `;
  });
  area.innerHTML = html;
  area.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function toggleDetail(btn) {
  const detail = btn.nextElementSibling;
  detail.classList.toggle('show');
  btn.innerHTML = detail.classList.contains('show')
    ? '收起详情 ▴'
    : '展开详细时间规划与服务清单 ▾';
}

function renderUniversities() {
  const c = document.getElementById('uni-list');
  if (c.dataset.loaded) return;
  c.dataset.loaded = '1';

  const sorted = [...universities].sort((a,b) => {
    if (a.qs === 0 && b.qs === 0) return 0;
    if (a.qs === 0) return 1;
    if (b.qs === 0) return -1;
    return a.qs - b.qs;
  });

  let html = '<div class="uni-grid">';
  for (const u of sorted) {
    const typeClass = u.type==='public'?'tag-public':u.type==='private'?'tag-private':'tag-branch';
    const typeLabel = u.type==='public'?'公立大学':u.type==='private'?'私立大学':'海外名校分校';
    html += `
      <div class="uni-card">
        <div class="uni-card-head">
          <div>
            <h3>${u.name}</h3>
            <div class="en">${u.en}</div>
          </div>
          <div class="card-tags" style="flex-shrink:0">
            <span class="tag ${typeClass}">${typeLabel}</span>
            ${u.qs > 0 ? `<span class="tag tag-qs">QS #${u.qs}</span>` : ''}
          </div>
        </div>
        <div class="uni-card-body">
          <div class="uni-info-row"><span class="lbl">所在城市</span><span class="val">${u.city}</span></div>
          <div class="uni-info-row"><span class="lbl">年学费范围</span><span class="val">${fmtMYR(u.tuition_min)} - ${fmtMYR(u.tuition_max)}</span></div>
          <div class="uni-info-row"><span class="lbl">年生活费约</span><span class="val">${fmtMYR(u.living_cost)}</span></div>
          <div class="uni-info-row"><span class="lbl">服务费</span><span class="val">${fmtMYR(u.service_fee)}</span></div>
          <div class="uni-info-row"><span class="lbl">入学月份</span><span class="val">${u.intake.map(m=>m+'月').join(' / ')}</span></div>
          <div class="uni-info-row"><span class="lbl">最低GPA</span><span class="val">${u.min_gpa} / 4.0</span></div>
          <div class="uni-info-row"><span class="lbl">最低雅思</span><span class="val">IELTS ${u.ielts_min}</span></div>
          <div class="uni-strengths">${u.strengths.map(s=>`<span>${s}</span>`).join('')}</div>
          <div class="uni-desc">${u.desc}</div>
        </div>
      </div>`;
  }
  html += '</div>';
  c.innerHTML = html;
}
</script>
</body>
</html>
