<head>

  <style>
    :root {
      --primary: #1a56db;
      --primary-light: #e8effc;
      --success: #059669;
      --warning: #d97706;
      --danger: #dc2626;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -4px rgba(0,0,0,.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      line-height: 1.6;
    }
    .header {
      background: linear-gradient(135deg, #1e3a8a 0%, #1a56db 50%, #2563eb 100%);
      color: white;
      padding: 2.5rem 0 3rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
    }
    .header h1 { font-size: 2.2rem; font-weight: 700; position: relative; letter-spacing: 2px; }
    .header p { opacity: 0.9; margin-top: 0.5rem; font-size: 1.1rem; position: relative; }
    .header .badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      padding: 0.3rem 1rem;
      border-radius: 999px;
      font-size: 0.85rem;
      margin-top: 0.75rem;
      position: relative;
      backdrop-filter: blur(4px);
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 1rem; }
    .tabs {
      display: flex;
      background: white;
      border-radius: 12px 12px 0 0;
      margin-top: -1.25rem;
      position: relative;
      box-shadow: var(--shadow);
      overflow: hidden;
      z-index: 2;
    }
    .tab {
      flex: 1;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      border: none;
      background: none;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--gray-500);
      transition: all 0.2s;
      border-bottom: 3px solid transparent;
    }
    .tab:hover { background: var(--gray-50); }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); background: var(--primary-light); }
    .panel {
      display: none;
      background: white;
      border-radius: 0 0 12px 12px;
      box-shadow: var(--shadow);
      padding: 2rem;
      margin-bottom: 2rem;
    }
    .panel.active { display: block; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    .form-group { display: flex; flex-direction: column; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.35rem; color: var(--gray-700); }
    .form-group label .req { color: var(--danger); }
    .form-group input, .form-group select {
      padding: 0.65rem 0.85rem;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: white;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26,86,219,0.1);
    }
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.25rem; }
    .checkbox-group label {
      display: flex; align-items: center; gap: 0.35rem;
      font-weight: 400; font-size: 0.9rem;
      padding: 0.4rem 0.85rem;
      border: 1.5px solid var(--gray-200);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .checkbox-group label:has(input:checked) {
      border-color: var(--primary); background: var(--primary-light); color: var(--primary);
    }
    .checkbox-group input { display: none; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 0.8rem 2.5rem; border: none; border-radius: 8px;
      font-size: 1.05rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #1e40af; transform: translateY(-1px); box-shadow: var(--shadow-lg); }
    .form-actions { grid-column: 1 / -1; display: flex; justify-content: center; margin-top: 1rem; }
    #results-area { margin-top: 2rem; }
    .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 0.5rem; }
    .results-header h2 { font-size: 1.3rem; }
    .gpa-note { font-size: 0.85rem; color: var(--gray-500); }
    .result-card {
      border: 1.5px solid var(--gray-200);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: all 0.2s;
      position: relative;
    }
    .result-card:hover { border-color: var(--primary); box-shadow: var(--shadow-lg); }
    .rank-badge {
      position: absolute; top: -1px; left: -1px;
      background: var(--primary); color: white;
      font-size: 0.8rem; font-weight: 700;
      padding: 0.25rem 0.75rem;
      border-radius: 12px 0 8px 0;
    }
    .rank-badge.gold { background: linear-gradient(135deg, #d97706, #f59e0b); }
    .rank-badge.silver { background: linear-gradient(135deg, #6b7280, #9ca3af); }
    .rank-badge.bronze { background: linear-gradient(135deg, #92400e, #b45309); }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
    .card-top h3 { font-size: 1.15rem; padding-top: 0.25rem; }
    .uni-en { font-size: 0.8rem; color: var(--gray-500); font-weight: 400; }
    .tags { display: flex; gap: 0.35rem; flex-wrap: wrap; }
    .tag { display: inline-block; padding: 0.15rem 0.55rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    .tag-public { background: #dbeafe; color: #1e40af; }
    .tag-private { background: #fef3c7; color: #92400e; }
    .tag-branch { background: #d1fae5; color: #065f46; }
    .tag-qs { background: #ede9fe; color: #5b21b6; }
    .tag-city { background: #f3f4f6; color: #374151; }
    .success-meter { width: 80px; text-align: center; flex-shrink: 0; }
    .success-meter .circle {
      width: 64px; height: 64px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 700; margin: 0 auto 0.25rem;
    }
    .success-meter .label { font-size: 0.75rem; color: var(--gray-500); }
    .rate-high .circle { background: #d1fae5; color: #059669; border: 3px solid #059669; }
    .rate-mid .circle { background: #fef3c7; color: #d97706; border: 3px solid #d97706; }
    .rate-low .circle { background: #fee2e2; color: #dc2626; border: 3px solid #dc2626; }
    .card-details {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.75rem; margin: 0.75rem 0; padding: 0.85rem;
      background: var(--gray-50); border-radius: 8px;
    }
    .detail-item .dl { font-size: 0.75rem; color: var(--gray-500); }
    .detail-item .dv { font-size: 0.95rem; font-weight: 600; }
    .card-reasons { margin-top: 0.75rem; }
    .reason { display: inline-block; font-size: 0.8rem; padding: 0.2rem 0.55rem; margin: 0.15rem; border-radius: 4px; }
    .reason-good { background: #d1fae5; color: #065f46; }
    .reason-warn { background: #fef3c7; color: #92400e; }
    .card-expand { display: none; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--gray-200); }
    .card-expand.show { display: block; }
    .timeline { display: flex; gap: 0; margin-top: 0.75rem; }
    .timeline-step { flex: 1; text-align: center; position: relative; padding: 0.5rem 0.25rem; }
    .timeline-step::before {
      content: ''; position: absolute; top: 1.4rem; left: 0; right: 0;
      height: 3px; background: var(--primary-light);
    }
    .timeline-step:first-child::before { left: 50%; }
    .timeline-step:last-child::before { right: 50%; }
    .timeline-step .dot {
      width: 12px; height: 12px; background: var(--primary);
      border-radius: 50%; display: inline-block; position: relative; z-index: 1;
    }
    .timeline-step .step-label { display: block; font-size: 0.72rem; color: var(--gray-500); margin-top: 0.25rem; }
    .timeline-step .step-time { display: block; font-size: 0.78rem; font-weight: 600; color: var(--gray-700); }
    .expand-btn {
      background: none; border: none; color: var(--primary);
      font-size: 0.85rem; cursor: pointer; margin-top: 0.5rem; padding: 0.25rem 0;
    }
    .expand-btn:hover { text-decoration: underline; }
    .service-box {
      margin-top: 1rem; padding: 0.85rem; background: var(--primary-light);
      border-radius: 8px; font-size: 0.85rem;
    }

    .uni-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; }
    .uni-card {
      border: 1.5px solid var(--gray-200); border-radius: 10px; padding: 1.25rem;
      transition: all 0.2s;

    .uni-card:hover { border-color: var(--primary); box-shadow: var(--shadow-lg); }
    .uni-card h3 { font-size: 1.05rem; margin-bottom: 0.15rem; }
    .uni-card .en { font-size: 0.8rem; color: var(--gray-500); margin-bottom: 0.6rem; }
    .uni-card .info-row { display: flex; justify-content: space-between; font-size: 0.85rem; padding: 0.2rem 0; }
    .uni-card .info-row .lbl { color: var(--gray-500); }
    .uni-card .strengths { margin-top: 0.5rem; display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .uni-card .strengths span { font-size: 0.75rem; background: var(--gray-100); padding: 0.15rem 0.45rem; border-radius: 3px; }
    .uni-card .desc { font-size: 0.8rem; color: var(--gray-500); margin-top: 0.5rem; line-height: 1.5; }
    .footer { text-align: center; padding: 1.5rem; color: var(--gray-500); font-size: 0.85rem; }
    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
      .header h1 { font-size: 1.5rem; }
      .card-top { flex-direction: column; gap: 0.5rem; }
      .card-details { grid-template-columns: 1fr 1fr; }
      .tabs { font-size: 0.85rem; }
      .tab { padding: 0.75rem 0.5rem; font-size: 0.85rem; }
      .timeline { flex-direction: column; gap: 0.25rem; }
      .timeline-step::before { display: none; }
      .uni-cards { grid-template-columns: 1fr; }
    }
  </style>
</head>

      <div class="form-grid">
        <div class="form-group">
          <label>姓名 <span class="req">*</span></label>
          <input type="text" name="name" required placeholder="请输入您的姓名">
        </div>

            <option value="高中">高中 / 中专</option>
            <option value="大专">大专</option>
            <option value="本科">本科</option>
            <option value="硕士">硕士</option>
          </select>
        </div>
        <div class="form-group">
          <label>GPA / 均分 <span class="req">*</span></label>
          <input type="number" name="gpa" required step="0.01" min="0" max="100"
            placeholder="4.0制或百分制均可（如 3.5 或 85）">
        </div>
        <div class="form-group">
          <label>雅思成绩（没有填 0）</label>
          <input type="number" name="ielts" step="0.5" min="0" max="9" value="0" placeholder="如 6.0">
        </div>
        <div class="form-group">
          <label>申请层次 <span class="req">*</span></label>
          <select name="targetLevel" required>
            <option value="">请选择</option>
            <option value="bachelor">本科</option>
            <option value="master">硕士</option>
            <option value="phd">博士</option>
          </select>
        </div>
        <div class="form-group">
          <label>意向专业方向</label>
          <select name="targetMajor">
            <option value="不限">不限 / 都可以</option>
            <option value="商科">商科 / 管理 / 金融</option>
            <option value="计算机">计算机 / IT / 软件</option>
            <option value="工程">工程 / 理工</option>
            <option value="教育">教育</option>
            <option value="医学">医学 / 护理 / 药学</option>
            <option value="传媒">传媒 / 新闻</option>
            <option value="艺术设计">艺术 / 设计 / 音乐</option>
            <option value="社科">社科 / 心理学</option>
            <option value="理科">理科 / 农业 / 环境</option>
            <option value="酒店旅游">酒店 / 旅游管理</option>
          </select>
        </div>
        <div class="form-group">
          <label>总预算（人民币，不填则不限）</label>
          <input type="number" name="budget" min="0" step="10000" placeholder="含学费+生活费+服务费，如 200000">
        </div>
        <div class="form-group full">
          <label>留学偏好（可多选）</label>
          <div class="checkbox-group">
            <label><input type="checkbox" name="pref" value="排名优先">排名优先</label>
            <label><input type="checkbox" name="pref" value="性价比">性价比高</label>
            <label><input type="checkbox" name="pref" value="就业导向">就业导向</label>
            <label><input type="checkbox" name="pref" value="学位认可">学位国际认可</label>
            <label><input type="checkbox" name="pref" value="城市生活">首都吉隆坡</label>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">开始智能匹配</button>
        </div>
      </div>
    </form>
    <div id="results-area"></div>
  </div>

  <!-- 大学总览 -->
  <div class="panel" id="panel-universities">
    <div id="uni-list"></div>
  </div>
</div>

// ====== GPA 转换 ======
function toGpa4(gpa) {
  if (gpa <= 4.0) return gpa;
  if (gpa >= 90) return 3.7;
  if (gpa >= 85) return 3.5;
  if (gpa >= 80) return 3.3;
  if (gpa >= 75) return 3.0;
  if (gpa >= 70) return 2.7;
  if (gpa >= 65) return 2.3;
  if (gpa >= 60) return 2.0;
  return 1.5;
}

// ====== 匹配算法 ======
function matchUniversities(student) {
  const { gpa, ielts, budget, targetLevel, targetMajor, preferences } = student;
  const gpa4 = toGpa4(gpa);
  const results = [];

  for (const uni of universities) {
    for (const prog of uni.programs) {
      if (prog.level !== targetLevel) continue;

      let score = 0, reasons = [], warnings = [];

      // 专业
      if (targetMajor && targetMajor !== '不限') {
        if (prog.cat === targetMajor) { score += 30; reasons.push('专业方向完全匹配'); }
        else continue;
      } else { score += 15; }

      // GPA
      const gpaReq = prog.gpa || uni.min_gpa || 2.5;
      if (gpa4 >= gpaReq + 0.5) { score += 25; reasons.push('GPA远超要求'); }
      else if (gpa4 >= gpaReq + 0.2) { score += 20; reasons.push('GPA高于要求'); }
      else if (gpa4 >= gpaReq) { score += 15; reasons.push('GPA达标'); }
      else if (gpa4 >= gpaReq - 0.3) { score += 5; warnings.push('GPA略低于要求，需额外材料补充'); }
      else { score -= 10; warnings.push('GPA低于最低要求，录取难度大'); }

      // 语言
      const ieltsReq = prog.ielts || uni.ielts_min || 5.5;
      const ie = ielts || 0;
      if (ie >= ieltsReq + 0.5) { score += 20; reasons.push('语言成绩优秀'); }
      else if (ie >= ieltsReq) { score += 15; reasons.push('语言成绩达标'); }
      else if (ie >= ieltsReq - 0.5 && ie > 0) { score += 5; warnings.push('语言成绩略低，可先读语言班'); }
      else if (ie === 0) { score += 5; warnings.push('无语言成绩，需参加学校内测或先读语言班'); }
      else { warnings.push('语言成绩较低，建议先读语言预科'); }

      // 费用
      const totalCost = prog.fee + uni.living_cost * prog.dur + uni.service_fee;
      const yearlyCost = Math.round((prog.fee / prog.dur) + uni.living_cost);
      if (budget && budget > 0) {
        if (budget >= totalCost * 1.2) { score += 15; reasons.push('预算充裕'); }
        else if (budget >= totalCost) { score += 12; reasons.push('预算匹配'); }
        else if (budget >= totalCost * 0.8) { score += 5; warnings.push('预算略紧张'); }
        else { score -= 5; warnings.push('预算不足，建议考虑更经济的方案'); }
      } else { score += 8; }

      // 偏好
      if (preferences) {
        if (preferences.includes('排名优先') && uni.qs > 0 && uni.qs <= 200) {
          score += 10; reasons.push('QS世界排名第' + uni.qs + '位');
        }
        if (preferences.includes('性价比') && yearlyCost < 50000) {
          score += 10; reasons.push('年度费用低于5万，性价比高');
        }
        if (preferences.includes('就业导向') && uni.type === 'private') {
          score += 5; reasons.push('私立大学就业服务完善');
        }
        if (preferences.includes('学位认可') && uni.type === 'foreign_branch') {
          score += 8; reasons.push('海外名校分校，学位国际认可');
        }
        if (preferences.includes('城市生活') && uni.city === '吉隆坡') {
          score += 5; reasons.push('位于首都吉隆坡');
        }
      }

      // 成功率
      let rate;
      if (score >= 70) rate = Math.min(95, 80 + Math.floor(Math.random()*10));
      else if (score >= 55) rate = 65 + Math.floor(Math.random()*15);
      else if (score >= 40) rate = 45 + Math.floor(Math.random()*15);
      else if (score >= 25) rate = 25 + Math.floor(Math.random()*15);
      else rate = Math.max(5, 10 + Math.floor(Math.random()*10));
      if (gpa4 < gpaReq - 0.3) rate = Math.max(5, Math.floor(rate * 0.3));

      results.push({
        uni_name: uni.name, uni_name_en: uni.name_en,
        uni_type: uni.type === 'public' ? '公立' : uni.type === 'private' ? '私立' : '海外分校',
        qs: uni.qs || 0, city: uni.city,
        program: prog.name,
        level: prog.level === 'bachelor' ? '本科' : prog.level === 'master' ? '硕士' : '博士',
        dur: prog.dur,
        tuition: prog.fee,
        living: uni.living_cost * prog.dur,
        service_fee: uni.service_fee,
        total: totalCost,
        yearly: yearlyCost,
        ieltsReq, gpaReq,
        special: prog.special || null,
        score, rate, reasons, warnings,
        intake: uni.intake,
        apply_months: uni.apply_months,
        desc: uni.desc,
      });
    }
  }

  results.sort((a,b) => b.score - a.score);
  return { results: results.slice(0, 10), gpa4 };
}

// ====== UI ======
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['match','universities'][i] === name);
  });
  document.querySelectorAll('.panel').forEach((p, i) => {
    p.classList.toggle('active', ['match','universities'][i] === name);
  });
  if (name === 'universities') renderUniversities();
}

function handleMatch(e) {
  e.preventDefault();
  const f = e.target;
  const prefs = [...f.querySelectorAll('input[name="pref"]:checked')].map(c => c.value);
  const student = {
    gpa: parseFloat(f.gpa.value),
    ielts: parseFloat(f.ielts.value) || 0,
    budget: parseInt(f.budget.value) || 0,
    targetLevel: f.targetLevel.value,
    targetMajor: f.targetMajor.value,
    preferences: prefs,
  };
  const { results, gpa4 } = matchUniversities(student);
  renderResults(results, student, gpa4);
}

  const area = document.getElementById('results-area');
  if (!results.length) {
    area.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--gray-500)">暂无匹配结果，请调整条件后重试</div>';

        <div class="card-expand">
          <p style="font-size:0.9rem;color:var(--gray-700);margin-bottom:0.5rem">${r.desc}</p>
          <strong style="font-size:0.85rem">入学时间：</strong><span style="font-size:0.85rem">${r.intake.join('、')}</span><br>
          <strong style="font-size:0.85rem">申请周期：</strong><span style="font-size:0.85rem">约 ${r.apply_months} 个月</span>
          <div class="timeline">
            <div class="timeline-step"><span class="dot"></span><span class="step-time">即日起</span><span class="step-label">准备材料</span></div>
            <div class="timeline-step"><span class="dot"></span><span class="step-time">1-2周</span><span class="step-label">递交申请</span></div>
            <div class="timeline-step"><span class="dot"></span><span class="step-time">${r.apply_months-1}个月</span><span class="step-label">获得offer</span></div>
            <div class="timeline-step"><span class="dot"></span><span class="step-time">${r.apply_months}个月</span><span class="step-label">办理签证</span></div>
            <div class="timeline-step"><span class="dot"></span><span class="step-time">${ni}</span><span class="step-label">正式入学</span></div>
          </div>
          <div class="service-box">
            <strong>服务包含：</strong>院校申请、材料翻译公证、offer跟进、签证办理、接机安排、入学注册协助
          </div>
        </div>
      </div>`;
  });
  area.innerHTML = html;
  area.scrollIntoView({ behavior:'smooth', block:'start' });
}

function findNextIntake(intakeMonths, applyMonths) {
  const now = new Date();
  const cur = now.getMonth() + 1;
  const nums = intakeMonths.map(m => parseInt(m));
  const ready = cur + applyMonths;
  for (const m of nums) {
    if (m >= (ready > 12 ? ready - 12 : ready)) {
      const y = ready > 12 ? now.getFullYear() + 1 : now.getFullYear();
      return y + '年' + m + '月';
    }
  }
  return (now.getFullYear() + 1) + '年' + nums[0] + '月';
}

function toggleExpand(btn) {
  const ex = btn.nextElementSibling;
  ex.classList.toggle('show');
  btn.textContent = ex.classList.contains('show') ? '收起详情 ▲' : '查看详细时间规划 ▼';
}

function renderUniversities() {
  const c = document.getElementById('uni-list');
  if (c.dataset.loaded) return;
  c.dataset.loaded = '1';
  let html = '<div class="uni-cards">';
  const sorted = [...universities].sort((a,b) => {
    if (a.qs === 0 && b.qs === 0) return 0;
    if (a.qs === 0) return 1;
    if (b.qs === 0) return -1;
    return a.qs - b.qs;
  });
  for (const u of sorted) {
    const typeCls = u.type==='public'?'tag-public':u.type==='private'?'tag-private':'tag-branch';
    const typeLabel = u.type==='public'?'公立':u.type==='private'?'私立':'海外分校';
    html += `
      <div class="uni-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <h3>${u.name}</h3>
            <div class="en">${u.name_en}</div>
          </div>
          <div class="tags" style="flex-shrink:0">
            <span class="tag ${typeCls}">${typeLabel}</span>
            ${u.qs > 0 ? `<span class="tag tag-qs">QS #${u.qs}</span>` : ''}
          </div>
        </div>
        <div class="info-row"><span class="lbl">城市</span><span>${u.city}</span></div>
        <div class="info-row"><span class="lbl">年学费</span><span>¥${u.tuition_min.toLocaleString()} - ¥${u.tuition_max.toLocaleString()}</span></div>
        <div class="info-row"><span class="lbl">年生活费</span><span>¥${u.living_cost.toLocaleString()}</span></div>
        <div class="info-row"><span class="lbl">服务费</span><span>¥${u.service_fee.toLocaleString()}</span></div>
        <div class="info-row"><span class="lbl">入学月</span><span>${u.intake.join('、')}</span></div>
        <div class="info-row"><span class="lbl">最低GPA</span><span>${u.min_gpa}</span></div>
        <div class="info-row"><span class="lbl">最低雅思</span><span>${u.ielts_min}</span></div>
        <div class="strengths">${u.strengths.map(s=>`<span>${s}</span>`).join('')}</div>
        <div class="desc">${u.desc}</div>
      </div>`;
  }
  html += '</div>';
  c.innerHTML = html;
}
</script>
</body>
</html>
